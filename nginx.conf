# NOTE: nginx add_header is NOT inherited when a child location block defines
# its own add_header directives. Security headers must be repeated in every
# location block that sets any header of its own.
map $sent_http_content_type $cache_control {
    default                           "no-cache, no-store, must-revalidate";
    ~text/html                        "no-cache, no-store, must-revalidate";
    ~application/javascript           "public, max-age=31536000, immutable";
    ~text/css                         "public, max-age=31536000, immutable";
    ~font/                            "public, max-age=31536000, immutable";
    ~image/                           "public, max-age=31536000, immutable";
}

server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Enable gzip compression
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;
    gzip_vary on;

    # Security + cache headers applied to every response via the map above.
    # Using add_header at server level with always so sub-locations inherit
    # correctly when they do NOT define their own add_header directives.
    add_header Cache-Control $cache_control always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=(), magnetometer=(), accelerometer=(), gyroscope=()" always;

    # Static assets: browser already gets 'public, max-age=31536000, immutable'
    # from the map above. Set expires as a belt-and-suspenders for Expires header.
    location ~* \.(?:js|css|woff2?|svg|png|webp|ico|jpg)$ {
        expires 1y;
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
